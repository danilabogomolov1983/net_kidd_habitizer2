name: net_kidd_habitizer2
description: "Habitizer 2.0 — Modular Monolith with Clean Architecture and Vertical Slices"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # SQLite persistence
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqflite_common_ffi_web: ^0.4.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0
  path_provider: ^2.1.5
  # Functional state management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Immutable value types
  equatable: ^2.0.7
  # Unique IDs
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  # Code generation for Riverpod
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  # Integration testing
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0058A3"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
